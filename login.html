<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Session</title>
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>
    <header class="header">
        <nav class="nav">

        </nav>
    </header>
    <main class="loginMain">
        <section class="loginSection ">
            <div class=" loginInputs">
                <form action="">
                    <div class="logoContainer">
                        <div class="logo firstLogo">
                            <p>N</p>
                        </div>
                        <div class="logo ">
                            <p>NOVATERRA</p>
                        </div>

                    </div>
                    <div class="inputContainer">
                        <div class="inputContainer textLogin">
                            <p>Iniciar Sesión</p>
                        </div>
                        <div class="inputContainer createAccount">
                            <p>¿Aún no tienes cuenta? <a href="#">¡Crea la tuya en Novaterra ahora!</a></p>
                        </div>
                        <div class="inputContainer">
                            <label for="userLogin">Usuario</label>
                            <input type="text" name="userLogin" id="userLogin">
                        </div>
                        <div class="inputContainer">
                            <label for="passLogin">Contraseña</label>
                            <input type="password" name="passLogin" id="passLogin">
                        </div>
                        <div class="inputContainer">
                            <input type="checkbox" name="" id="checkLogin">
                            <label for="checkLogin">Recordar contraseña</label>
                        </div>
                    </div>
                    <div class="buttonContainer">
                        <button type="button">Iniciar Sesión</button>
                        <a href="#">Recuperar contraseña</a>
                    </div>

                </form>
            </div>
        </section>
        <section class="loginSection loginImg ">
            <div class="loginImgContainer">
                <img src="https://www.gosite.com/hubfs/2022%20Blogs/How%20to%20Start%20a%20Multi-Service%20Business/Blog%20-%20How%20To%20Start%20a%20Multi-Service%20Business.png" alt="">
            </div>
        </section>
    </main>
    <footer>

    </footer>

</body>

</html>
